version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nehl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nehl}
      POSTGRES_DB: ${POSTGRES_DB:-nehl}
    volumes:
      - nehl_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nehl}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets
      - ./generated:/app/generated
    # No command override needed -- the image's entrypoint.sh already runs
    # `alembic upgrade head` before starting the bot.

volumes:
  nehl_pgdata:
